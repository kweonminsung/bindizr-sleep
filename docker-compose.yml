version: "3.8"

services:
  sleep:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "953:953/tcp"
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - bind-data:/etc/bind
      - bindizr-data:/etc/bindizr

volumes:
  bind-data:
  bindizr-data:
